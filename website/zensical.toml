[project]
site_name = "N-Vision-74 Documentation"
site_description = "A comprehensive guide to the N-Vision-74 1/10 scale vehicle project"
site_author = "N-Vision Team"
docs_dir = "docs"
site_dir = "site"

[theme]
name = "material"
language = "en"

[theme.features]
navigation_tabs = true
navigation_sections = true
navigation_expand = true
navigation_top = true
search_suggest = true
search_highlight = true
content_tabs_link = true
content_code_copy = true

[[theme.palette]]
scheme = "default"
primary = "blue"
accent = "orange"
toggle_icon = "material/toggle-switch-off-outline"
toggle_name = "Switch to dark mode"

[[theme.palette]]
scheme = "slate"
primary = "blue"
accent = "red"
toggle_icon = "material/toggle-switch"
toggle_name = "Switch to light mode"

[plugins]
search = {}
glightbox = {}

[extra]
javascript = ["javascripts/stl-viewer-module.js"]
css = ["stylesheets/extra.css"]

[nav]
home = "index.md"
getting_started = [
    { title = "Bill of Materials", path = "getting_started/bom.md" },
    { title = "Cost Analysis", path = "getting_started/cost_analysis.md" },
    { title = "Parts Inventory", path = "getting_started/parts.md" }
]
technical = [
    { title = "Quick Start Guide", path = "technical/quick_start.md" },
    { title = "Assembly Guide", path = "technical/assembly.md" }
]
previews = [
    { title = "Body & Shell", path = "previews/body_shell.md" },
    { title = "Chassis", path = "previews/chassis.md" },
    { title = "Suspension", path = "previews/suspension.md" },
    { title = "Drivetrain", path = "previews/drivetrain.md" },
    { title = "Electronics", path = "previews/electronics.md" },
    { title = "Steering", path = "previews/steering.md" }
]
resources = [
    { title = "Downloads", path = "resources/downloads.md" },
    { title = "CAD Files", path = "resources/cad_files.md" }
]
