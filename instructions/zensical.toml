# Zensical Configuration for N-Vision-74 Project
# Modern static site generator with Material Design theme and 3D component previews

site_name = "N-Vision-74 Documentation"
site_description = "A comprehensive guide to the N-Vision-74 1/10 scale vehicle project with 3D component previews."
site_author = "N-Vision Team"

repo_url = "https://github.com/CagriCatik/N-Vision-74"
repo_name = "N-Vision-74"

extra_javascript = [
    { path = "javascripts/stl-viewer-module.js", type = "module" }
]

extra_css = [
    "stylesheets/extra.css"
]

markdown_extensions = [
    "pymdownx.highlight",
    "pymdownx.inlinehilite",
    "pymdownx.snippets",
    "admonition",
    "footnotes",
    "pymdownx.details",
    "pymdownx.superfences",
    "pymdownx.mark",
    "attr_list",
    "md_in_html"
]

[theme]
name = "material"
logo = "assets/images/logo.webp"

[theme.features]
navigation_tabs = true
navigation_sections = true
navigation_expand = true
navigation_top = true
search_suggest = true
search_highlight = true
content_tabs_link = true
content_code_copy = true

[theme.palette]
scheme = "slate"
primary = "black"
accent = "red"

[theme.icon]
logo = "lucide/car-front"
repo = "fontawesome/brands/github"

[[plugins]]
name = "search"

